name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default: any new job must opt into the scopes it needs.
permissions: {}

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          CURRENT_TAG="$REF_NAME"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:'%s' --no-merges)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:'%s' --no-merges)
          fi

          # Backend scopes are dev-facing; keep them out of the public notes. Must stay in
          # sync with Scripts/generate_release_notes.sh (the in-app "What's New" sheet).
          BACKEND='ci|cd|build|dev|docs|test|chore|deps|infra|release|tooling|project|repo|meta'
          # '|| true' is load-bearing: this pipeline ENDS in grep, so a release with only
          # backend commits (grep matches nothing -> exit 1) would kill the step under
          # 'bash -e' before the "no user-facing changes" fallback below could ever run.
          # The NEW/IMPROVED/FIXED pipelines below end in sort, so they can't fail this way.
          USER_COMMITS=$(printf '%s\n' "$COMMITS" | grep -Ev "^(Add|Improve|Fix)\((${BACKEND})\): " || true)

          # Match with an OPTIONAL scope and strip it, so user-facing scoped commits
          # (e.g. "Fix(player): …") are included — an anchored '^Fix:' silently dropped them.
          NEW=$(printf '%s\n' "$USER_COMMITS"      | grep -E '^Add(\([^)]*\))?: '     | sed -E 's/^Add(\([^)]*\))?: /- /'     | sort)
          IMPROVED=$(printf '%s\n' "$USER_COMMITS" | grep -E '^Improve(\([^)]*\))?: ' | sed -E 's/^Improve(\([^)]*\))?: /- /' | sort)
          FIXED=$(printf '%s\n' "$USER_COMMITS"    | grep -E '^Fix(\([^)]*\))?: '     | sed -E 's/^Fix(\([^)]*\))?: /- /'     | sort)

          NOTES=""
          [ -n "$NEW" ]      && NOTES="${NOTES}### New\n${NEW}\n\n"
          [ -n "$IMPROVED" ] && NOTES="${NOTES}### Improved\n${IMPROVED}\n\n"
          [ -n "$FIXED" ]    && NOTES="${NOTES}### Fixed\n${FIXED}\n\n"
          [ -z "$NOTES" ]    && NOTES="_No user-facing changes since ${PREV_TAG}._"

          printf '%b' "$NOTES" > /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: /tmp/release_notes.md

  build-dmg:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Full history + tags so the macOS "Generate Release Notes" build phase
          # (Scripts/generate_release_notes.sh) can find the previous release tag.
          # A shallow clone hides it and the bundled What's New notes come out empty
          # — same issue fixed for Xcode Cloud via ci_scripts/ci_post_clone.sh.
          fetch-depth: 0

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: echo "$API_KEY" > "$RUNNER_TEMP/api_key.p8"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/UncleStreamus.provisionprofile"

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme UncleStreamus \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/UncleStreamus.xcarchive" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            PROVISIONING_PROFILE_SPECIFIER="UncleStreamus Developer ID" \
            DEVELOPMENT_TEAM=M94NB5JY3R

      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/UncleStreamus.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist .github/ExportOptions.plist

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "UncleStreamus" \
            -srcfolder "$RUNNER_TEMP/export/UncleStreamus.app" \
            -ov -format UDZO \
            "$RUNNER_TEMP/UncleStreamus.dmg"

      - name: Notarize DMG
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/UncleStreamus.dmg" \
            --key "$RUNNER_TEMP/api_key.p8" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait

      - name: Staple DMG
        run: xcrun stapler staple "$RUNNER_TEMP/UncleStreamus.dmg"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: gh release upload "$REF_NAME" "$RUNNER_TEMP/UncleStreamus.dmg"

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/api_key.p8"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/UncleStreamus.provisionprofile"
